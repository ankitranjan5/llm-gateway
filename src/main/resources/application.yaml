spring:
  application:
    name: llm-gateway

  threads:
    virtual:
      enabled: true


management:
  tracing:
    sampling:
      probability: 1.0


  zipkin:
    tracing:
        enabled: true
        endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

resilience4j:
  circuitbreaker:
    instances:
      openai:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

openai:
  api:
    key: ${OPENAI_API_KEY}
